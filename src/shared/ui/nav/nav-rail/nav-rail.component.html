<div class="header">
    <dma-nav-brand [imageOnly]="isCollapsed()" />
</div>
<div class="body">
    <ng-content select="[dmaNavRailBody]" />
</div>
<div class="footer">
    <div class="actions">
        <ng-content select="[dmaNavRailActions]" />
    </div>
    <dma-nav-rail-toggle
        orientation="horizontal-reverse"
        #tooltip
        [dmaTooltipAnchor]="tooltipLabel()"
        [collapsed]="isCollapsed()"
        (toggleNavRail)="onToggle($event)"
    />
</div>
