<ng-container *dmaTranslate="let t">
    <dma-app-top-bar />
    <main>
        <dma-nav-rail #navRail>
            <ng-container dmaNavRailBody>
                <dma-nav-link
                    route="/characters"
                    orientation="horizontal-reverse"
                    [iconOnly]="navRail.isCollapsed()"
                    [dmaTooltipAnchor]="t('LABEL_CHARACTERS')"
                    [tooltipDisabled]="!navRail.isCollapsed()"
                >
                    <dma-icon dma-users-icon dmaLeadingIcon />
                    {{ t('LABEL_CHARACTERS') }}
                </dma-nav-link>
                <dma-nav-link
                    route="/campaigns"
                    orientation="horizontal-reverse"
                    [iconOnly]="navRail.isCollapsed()"
                    [dmaTooltipAnchor]="t('LABEL_CAMPAIGNS')"
                    [tooltipDisabled]="!navRail.isCollapsed()"
                >
                    <dma-icon dma-dungeon-icon dmaLeadingIcon />
                    {{ t('LABEL_CAMPAIGNS') }}
                </dma-nav-link>
                <dma-nav-link
                    route="/compendium"
                    orientation="horizontal-reverse"
                    [iconOnly]="navRail.isCollapsed()"
                    [dmaTooltipAnchor]="t('LABEL_COMPENDIUM')"
                    [tooltipDisabled]="!navRail.isCollapsed()"
                >
                    <dma-icon dma-book-open-icon dmaLeadingIcon />
                    {{ t('LABEL_COMPENDIUM') }}
                </dma-nav-link>
            </ng-container>
            <ng-container dmaNavRailActions>
                <dma-login-button [iconOnly]="navRail.isCollapsed()" />
                <dma-signup-button [iconOnly]="navRail.isCollapsed()" />
            </ng-container>
        </dma-nav-rail>
        <router-outlet></router-outlet>
    </main>
</ng-container>
